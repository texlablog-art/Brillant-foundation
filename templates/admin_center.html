{% extends "admin_base.html" %}

{% block content %}
<div style="padding: 30px; font-family: 'Inter', sans-serif;">
    <h2 style="color: #2c3e50; margin-bottom: 25px;"><i class="fas fa-map-marker-alt"></i> Manage Exam Centers</h2>

    <div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px;">
        <h4 style="margin-top: 0; color: #334155; margin-bottom: 15px;">Add New Center</h4>
        <form action="{{ url_for('add_center') }}" method="POST" style="display: flex; gap: 15px; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 150px;">
                <label style="font-size: 12px; font-weight: bold; color: #64748b;">Center Code</label>
                <input type="text" name="center_code" placeholder="e.g. BOG-05" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px;">
            </div>

            <div style="flex: 2; min-width: 250px;">
                <label style="font-size: 12px; font-weight: bold; color: #64748b;">Center Name (English)</label>
                <input type="text" name="center_name_en" placeholder="e.g. Bogra Zilla School" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px;">
            </div>

            <div style="flex: 2; min-width: 250px;">
                <label style="font-size: 12px; font-weight: bold; color: #64748b;">সেন্টারের নাম (বাংলা)</label>
                <input type="text" name="center_name_bn" placeholder="উদা: বগুড়া জিলা স্কুল" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; font-family: 'Kalpurush', sans-serif;">
            </div>

            <div style="display: flex; align-items: flex-end;">
                <button type="submit" style="background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 45px;">
                    <i class="fas fa-plus"></i> Add Center
                </button>
            </div>
        </form>
    </div>

    <div style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0; text-align: left;">
                    <th style="padding: 15px 20px; width: 150px;">Code</th>
                    <th style="padding: 15px 20px;">Center Name (English)</th>
                    <th style="padding: 15px 20px;">সেন্টারের নাম (বাংলা)</th>
                    <th style="padding: 15px 20px; text-align: center; width: 100px;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for c in centers %}
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 15px 20px; font-weight: 700; color: #1e293b;">{{ c.center_code }}</td>
                    <td style="padding: 15px 20px; color: #475569;">{{ c.center_name_en }}</td>
                    <td style="padding: 15px 20px; color: #475569; font-family: 'Kalpurush', sans-serif;">{{ c.center_name_bn }}</td>
                    <td style="padding: 15px 20px; text-align: center;">
                        <a href="{{ url_for('delete_center', center_id=c._id) }}" 
                           onclick="return confirm('Are you sure you want to delete this center?')"
                           style="color: #ef4444; text-decoration: none; font-size: 1.2rem;" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="padding: 30px; text-align: center; color: #94a3b8;">No centers added yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
